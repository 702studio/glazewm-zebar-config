<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Custom styles. -->
    <link rel="stylesheet" type="text/css" href="./styles.css" />

    <!-- Allows React to be run buildless via "text/babel" script below. -->
    <script
      src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"
      integrity="sha256-aS0B0wnsaDByLfE16h4MDCP1fQFccysd1YWOcV+gbBo="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, {
        useState,
        useEffect,
      } from 'https://esm.sh/react@18?dev';
      import { createRoot } from 'https://esm.sh/react-dom@18/client?dev';
      import * as zebar from 'https://esm.sh/zebar@3.0';

      const providers = zebar.createProviderGroup({
        network: { type: 'network' },
        glazewm: { type: 'glazewm' },
        cpu: { type: 'cpu' },
        date: { type: 'date', formatting: 'HH:mm  •  d MMM yyyy' },
        battery: { type: 'battery' },
        memory: { type: 'memory' },
      });

      const layoutPresets = [
        { name: 'fair', label: 'Fair', command: 'fair' },
        { name: 'fair_horizontal', label: 'Fair H', command: 'fair_horizontal' },
        { name: 'columns', label: 'Cols', command: 'columns' },
        { name: 'rows', label: 'Rows', command: 'rows' },
      ];

      createRoot(document.getElementById('root')).render(<App />);

      function App() {
        const [output, setOutput] = useState(providers.outputMap);
        const [layoutState, setLayoutState] = useState({
          layout_mode: 'fair',
          display_name: 'fair',
        });

        useEffect(() => {
          providers.onOutput(() => setOutput(providers.outputMap));
        }, []);

        useEffect(() => {
          let mounted = true;

          async function readLayoutState() {
            try {
              const response = await fetch(`./layout-state.json?t=${Date.now()}`, {
                cache: 'no-store',
              });
              if (!response.ok) return;
              const nextState = await response.json();
              if (mounted && nextState?.layout_mode) {
                setLayoutState(nextState);
              }
            } catch (_) {}
          }

          readLayoutState();
          const intervalId = setInterval(readLayoutState, 700);
          return () => {
            mounted = false;
            clearInterval(intervalId);
          };
        }, []);

        const allWorkspaceNames = ['1', '2', '3', '4', '5', '6', '7', '8', '9'];

        // Get icon to show for current network status.
        function getNetworkIcon(networkOutput) {
          switch (networkOutput.defaultInterface?.type) {
            case 'ethernet':
              return <i className="nf nf-md-ethernet_cable"></i>;
            case 'proprietary_virtual':
              return <i className="nf nf-md-shield_lock_outline"></i>;
            case 'wifi':
              if (networkOutput.defaultGateway?.signalStrength >= 80) {
                return <i className="nf nf-md-wifi_strength_4"></i>;
              } else if (
                networkOutput.defaultGateway?.signalStrength >= 65
              ) {
                return <i className="nf nf-md-wifi_strength_3"></i>;
              } else if (
                networkOutput.defaultGateway?.signalStrength >= 40
              ) {
                return <i className="nf nf-md-wifi_strength_2"></i>;
              } else if (
                networkOutput.defaultGateway?.signalStrength >= 25
              ) {
                return <i className="nf nf-md-wifi_strength_1"></i>;
              } else {
                return <i className="nf nf-md-wifi_strength_outline"></i>;
              }
            default:
              return (
                <i className="nf nf-md-wifi_strength_off_outline"></i>
              );
          }
        }

        // Get icon to show for how much of the battery is charged.
        function getBatteryIcon(batteryOutput) {
          if (batteryOutput.chargePercent > 90)
            return <i className="nf nf-fa-battery_4"></i>;
          if (batteryOutput.chargePercent > 70)
            return <i className="nf nf-fa-battery_3"></i>;
          if (batteryOutput.chargePercent > 40)
            return <i className="nf nf-fa-battery_2"></i>;
          if (batteryOutput.chargePercent > 20)
            return <i className="nf nf-fa-battery_1"></i>;
          return <i className="nf nf-fa-battery_0"></i>;
        }

        const focusedTitle = output.glazewm?.focusedContainer?.title || output.glazewm?.focusedContainer?.name || '';

        return (
          <div className="app">
            <div className="left">
              <i className="logo nf nf-fa-windows"></i>
              {output.glazewm && (
                <div className="workspaces">
                  {allWorkspaceNames.map(name => {
                    const workspace = output.glazewm.currentWorkspaces.find(
                      ws => ws.name === name
                    );
                    const isFocused = workspace?.hasFocus;
                    const isDisplayed = workspace?.isDisplayed;
                    const hasWindows = workspace?.clientIds && workspace.clientIds.length > 0;
                    
                    let wsClass = 'workspace';
                    if (isFocused) wsClass += ' focused';
                    else if (isDisplayed) wsClass += ' displayed';
                    
                    if (hasWindows) wsClass += ' occupied';
                    else wsClass += ' empty';

                    return (
                      <button
                        className={wsClass}
                        onClick={() =>
                          output.glazewm.runCommand(
                            `focus --workspace ${name}`,
                          )
                        }
                        key={name}
                      >
                        <span className="workspace-number">{name}</span>
                        <span className="workspace-indicator"></span>
                      </button>
                    );
                  })}
                </div>
              )}
              {focusedTitle && (
                <div className="window-title" title={focusedTitle}>
                  {focusedTitle}
                </div>
              )}
            </div>

            <div className="center">
              {output.date?.formatted}
            </div>

            <div className="right">
              {output.glazewm && (
                <>
                  <div className="layout-switcher" title={`Layout: ${layoutState.display_name}`}>
                    {layoutPresets.map(preset => (
                      <button
                        className={`layout-choice ${preset.name} ${layoutState.layout_mode === preset.name ? 'active' : ''}`}
                        key={preset.name}
                        title={preset.label}
                        onClick={() =>
                          output.glazewm.runCommand(
                            `shell-exec pythonw C:/Users/tolgaozisik/glaze_autotile.py --layout ${preset.command}`,
                          )
                        }
                      >
                        <span className="layout-icon" aria-hidden="true"></span>
                      </button>
                    ))}
                  </div>

                  {output.glazewm.isPaused && (
                    <button
                      className="mode-pill"
                      onClick={() =>
                        output.glazewm.runCommand('wm-toggle-pause')
                      }
                    >
                      PAUSED
                    </button>
                  )}
                  {output.glazewm.bindingModes.map(bindingMode => (
                    <button
                      className="mode-pill"
                      key={bindingMode.name}
                      onClick={() =>
                        output.glazewm.runCommand(
                          `wm-disable-binding-mode --name ${bindingMode.name}`,
                        )
                      }
                    >
                      {bindingMode.displayName ?? bindingMode.name.toUpperCase()}
                    </button>
                  ))}
                </>
              )}

              {output.network && (
                <div className="status-pill network">
                  {getNetworkIcon(output.network)}
                  <span>{output.network.defaultGateway?.ssid || 'Ethernet'}</span>
                </div>
              )}

              {output.memory && (
                <div className="status-pill memory">
                  <i className="nf nf-fae-chip"></i>
                  <span>{Math.round(output.memory.usage)}%</span>
                </div>
              )}

              {output.cpu && (
                <div className={`status-pill cpu ${output.cpu.usage > 85 ? 'cpu-high' : ''}`}>
                  <i className="nf nf-oct-cpu"></i>
                  <span>{Math.round(output.cpu.usage)}%</span>
                </div>
              )}

              {output.battery && (
                <div className="status-pill battery">
                  {output.battery.isCharging && (
                    <i className="nf nf-md-power_plug"></i>
                  )}
                  {getBatteryIcon(output.battery)}
                  <span>{Math.round(output.battery.chargePercent)}%</span>
                </div>
              )}
            </div>
          </div>
        );
      }
    </script>
  </body>
</html>
